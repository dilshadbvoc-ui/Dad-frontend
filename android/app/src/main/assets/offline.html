<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Offline</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 24px;
        }
        .container {
            max-width: 400px;
            width: 100%;
        }
        .icon-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 32px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .pulse-circle {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: rgba(99, 102, 241, 0.15);
            animation: pulse 2s infinite ease-in-out;
        }
        .icon {
            font-size: 64px;
            z-index: 2;
            color: #6366f1;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #f8fafc;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 15px;
            line-height: 1.6;
            color: #94a3b8;
            margin-bottom: 36px;
        }
        .btn-retry {
            display: inline-block;
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .btn-retry:active {
            transform: scale(0.98);
            box-shadow: 0 2px 6px rgba(99, 102, 241, 0.2);
        }
        @keyframes pulse {
            0% {
                transform: scale(0.9);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.15);
                opacity: 0.3;
            }
            100% {
                transform: scale(0.9);
                opacity: 0.8;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-container">
            <div class="pulse-circle"></div>
            <div class="icon">🔌</div>
        </div>
        <h1>Connection Lost</h1>
        <p>Your device is offline or the CRM server is temporarily unreachable. Please check your network settings and try again.</p>
        <button class="btn-retry" onclick="retryConnection()">Try Again</button>
    </div>

    <script>
        function retryConnection() {
            const btn = document.querySelector('.btn-retry');
            btn.innerHTML = 'Connecting...';
            btn.disabled = true;
            btn.style.opacity = '0.7';
            
            setTimeout(() => {
                if (window.AndroidBridge && window.AndroidBridge.retryConnection) {
                    window.AndroidBridge.retryConnection();
                } else {
                    window.location.reload();
                }
            }, 500);
        }
    </script>
</body>
</html>
